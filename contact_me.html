<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Website Name - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Get in Touch</h1>
    </header>
  <main>
    <section class="contact-form">
      <h2>Let's Talk!</h2>
      <form action="#" method="post">
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="message">Message:</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit">Send Message</button>
      </form>
    </section>
    <section class="contact-info">
      <h2>Alternative Ways to Connect</h2>
      <ul>
        <li><a href="tel:+1234567890">Phone: 123-456-7890</a></li>
        <li><a href="mailto:youremail@example.com">Email: youremail@example.com</a></li>
        <li><a href="#">Connect on Social Media</a></li>
      </ul>
    </section>
  </main>
  <footer>
    </footer>
</body>
</html>
