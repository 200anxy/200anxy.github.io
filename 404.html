<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <h1>404 Not Found</h1>
    <style>
        body {
            background-color: #222; /* Dark background */
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Cover viewport height */
        }

        .animation-container {
            width: 400px; /* Adjust width as desired */
            height: 200px; /* Adjust height as desired */
            position: relative;
        }

        .letter {
            position: absolute;
            font-size: 120px; /* Adjust font size as desired */
            color: #fff; /* White text */
            animation: animate 3s infinite ease-in-out; /* Animation properties */
        }

        .letter:nth-child(1) {
            left: 0;
            animation-delay: 0s;
        }

        .letter:nth-child(2) {
            left: 100px;
            animation-delay: 0.2s;
        }

        .letter:nth-child(3) {
            left: 200px;
            animation-delay: 0.4s;
        }

        .letter:nth-child(4) {
            left: 300px;
            animation-delay: 0.6s;
        }

        .letter:nth-child(5) {
            left: 150px;
            top: 50px;
            font-size: 80px; /* Adjust size for "y" */
            animation-delay: 0.8s;
        }

        @keyframes animate {
            0%, 100% {
                opacity: 0;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-30px); /* Add bounce effect */
            }
        }
    </style>
</head>
<body>
    <div class="animation-container">
        <span class="letter">2</span>
        <span class="letter">0</span>
        <span class="letter">0</span>
        <span class="letter">a</span>
        <span class="letter">n</span>
        <span class="letter">x</span>
        <span class="letter">y</span>
    </div>
</body>
</html>
