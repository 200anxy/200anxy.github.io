<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>200anxy.is-a.dev</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .text-container {
      display: inline-block;
      animation: scramble 2s linear infinite;
    }

    @keyframes scramble {
      0% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(90deg) scale(1.1);
      }
      50% {
        transform: rotate(180deg);
      }
      75% {
        transform: rotate(270deg) scale(0.8);
      }
      100% {
        transform: rotate(0deg);
      }
    }

    .text-container span {
      display: inline-block;
      animation: distort 2s ease-in-out infinite alternate;
      margin: 0 5px;
    }

    @keyframes distort {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.8);
      }
    }
  </style>
</head>
<body>
  <div class="text-container">
    <span>2</span>
    <span>0</span>
    <span>0</span>
    <span>a</span>
    <span>n</span>
    <span>x</span>
    <span>y</span>
  </div>
</body>
</html>
