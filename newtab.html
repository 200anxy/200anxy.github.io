<!DOCTYPE html>
<html>
<head>
    <title>New Tab Page</title>
    <Body background="assets/cool-background.jpg">  <!-- Added background image -->
    <style>
        body {
            


            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0; /* Added to remove default margin */
            padding: 0; /* Added to remove default padding */
        }

        #time {
            font-size: 72px; /* Increased font size */
            color: white;
            margin-top: 100px;
            text-shadow: 0 0 10px white, 0 0 20px white, 0 0 30px white; /* Added glowing effect */
        }
        
        #search-bar {
            width: 400px;
            height: 40px;
            margin: 20px auto;
            border: none;
            border-radius: 20px;
            padding: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="time"></div>
    <input type="text" id="search-bar" placeholder="Search...">
    
    <script>
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            
            var timeString = hours.toString().padStart(2, '0') + ':' + minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
            
            document.getElementById('time').textContent = timeString;
        }
        
        setInterval(updateTime, 1000);
    </script>
</body>

</html>
